<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html{overflow-x:hidden;max-width:100vw;}html,body{overflow-x:hidden;max-width:100vw;}html{overflow-x:hidden;}
body{font-family:"DM Sans",system-ui,-apple-system,sans-serif;background:#FAFAF7;color:#1C1B17;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
input,select,textarea,button{font-family:inherit;}
input,select,textarea{width:100%;padding:11px 14px;border:1.5px solid rgba(60,54,40,0.16);border-radius:8px;font-size:14px;color:#1C1B17;background:#fff;transition:border-color 0.15s,box-shadow 0.15s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#F09819;box-shadow:0 0 0 3px rgba(240,152,25,0.18);}
input::placeholder,textarea::placeholder{color:#AAA89F;}
textarea{resize:vertical;min-height:72px;line-height:1.55;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#C8C6BE;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
</style>
</head>

// ── Firestore helpers ────────────────────────────────────────────────────────
// Path: users/{uid}/collections/{col}
function col(uid, name) {
  return db.collection("users").doc(uid).collection(name);
}

async function fbLoad(uid, name) {
  try {
    const snap = await col(uid, name).get();
    return snap.docs.map(d => ({id: d.id, ...d.data()}));
  } catch(e) { console.error("fbLoad", name, e); return []; }
}

async function fbSave(uid, name, item) {
  try {
    await col(uid, name).doc(item.id).set(item);
  } catch(e) { console.error("fbSave", name, e); }
}

async function fbDelete(uid, name, id) {
  try {
    await col(uid, name).doc(id).delete();
  } catch(e) { console.error("fbDelete", name, e); }
}

async function fbSaveAll(uid, name, items) {
  const batch = db.batch();
  items.forEach(item => {
    batch.set(col(uid, name).doc(item.id), item);
  });
  await batch.commit();
}

// ── Collaboration helpers ─────────────────────────────────────────────────────
// Roles: "owner" | "editor" | "viewer"
// stored at users/{uid}/collaborators/{granteeUid} = {email, role, grantedAt}
// and at users/{granteeUid}/accessGrants/{ownerUid} = {ownerEmail, role}
async function grantAccess(ownerUid, granteeEmail, role) {
  const usersSnap = await db.collection("userEmails").doc(granteeEmail.toLowerCase()).get();
  if (!usersSnap.exists) throw new Error("No account found for " + granteeEmail);
  const granteeUid = usersSnap.data().uid;
  const batch = db.batch();
  batch.set(
    db.collection("users").doc(ownerUid).collection("collaborators").doc(granteeUid),
    {email: granteeEmail.toLowerCase(), role, grantedAt: new Date().toISOString()}
  );
  batch.set(
    db.collection("users").doc(granteeUid).collection("accessGrants").doc(ownerUid),
    {ownerEmail: auth.currentUser.email, role, grantedAt: new Date().toISOString()}
  );
  await batch.commit();
}

      ["inspections", KEYS.inspections],
      ["tasks",    KEYS.tasks],
      ["treatments", KEYS.treatments],
      ["feeds",    KEYS.feeds],

    return count;
